<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Aviator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0e17;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .game-container {
      max-width: 400px;
      width: 100%;
      min-height: 850px;
      background: #0a0e17;
      position: relative;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 20px 16px 12px;
    }

    .header h1 {
      color: white;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    /* Balance */
    .balance-row {
      display: flex;
      justify-content: center;
      align-items: baseline;
      padding: 8px 16px 16px;
      gap: 4px;
    }

    .balance-amount {
      color: #ffd700;
      font-size: 24px;
      font-weight: 700;
    }

    .balance-currency {
      color: #6a7a8a;
      font-size: 14px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: #1a2533;
      margin: 0 16px;
    }

    /* Bet Rush */
    .bet-rush-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
    }

    .bet-rush {
      color: #ff4757;
      font-weight: 700;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #6a7a8a;
      font-size: 13px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #00ff88;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    /* Rooms Grid */
    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 8px 16px 16px;
    }

    .room-card {
      background: #0d1421;
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
      border: 1px solid #1a2533;
    }

    .room-name {
      color: #6a7a8a;
      font-size: 11px;
      margin-bottom: 4px;
    }

    .room-multiplier {
      font-weight: 800;
      font-size: 16px;
    }

    .multiplier-green {
      color: #00a86b;
    }

    .multiplier-red {
      color: #e74c3c;
    }

    /* Canvas */
    .canvas-wrapper {
      margin: 8px 16px;
      border-radius: 16px;
      overflow: hidden;
      background: #060b14;
      position: relative;
    }

    #gameCanvas {
      width: 100%;
      height: 240px;
      display: block;
      background: #060b14;
    }

    .current-multiplier {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 56px;
      font-weight: 900;
      color: white;
      text-shadow: 0 0 30px rgba(255,255,255,0.3);
      z-index: 10;
      pointer-events: none;
    }

    .current-multiplier.flying {
      color: #00ff88;
      text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
      animation: glow 0.8s infinite;
    }

    /* Live Bets Feed */
    .live-bets {
      padding: 8px 16px;
      max-height: 60px;
      overflow: hidden;
    }

    .bet-feed-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #8a9aaa;
      font-size: 12px;
      padding: 4px 0;
      animation: slideUp 0.3s;
    }

    .bet-amount {
      color: #ffd700;
      font-weight: 600;
    }

    .bet-cashout {
      color: #00a86b;
      font-weight: 600;
    }

    /* Partners */
    .partners-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      margin-top: 8px;
    }

    .partners-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ufc-badge {
      background: #e74c3c;
      color: white;
      font-weight: 900;
      font-size: 16px;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .official-text {
      color: #6a7a8a;
      font-size: 11px;
      line-height: 1.3;
      font-weight: 600;
    }

    .spribe-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .spribe-badge {
      background: #1a1a3e;
      color: #00d4ff;
      font-weight: 800;
      font-size: 15px;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .since-text {
      color: #6a7a8a;
      font-size: 11px;
      line-height: 1.3;
    }

    .verified-check {
      color: #00a86b;
      font-size: 12px;
    }

    /* Betting Tabs */
    .betting-tabs {
      display: flex;
      padding: 16px 16px 8px;
      gap: 24px;
      border-bottom: 1px solid #1a2533;
    }

    .tab {
      color: #4a5a6a;
      font-weight: 700;
      font-size: 16px;
      padding-bottom: 8px;
      cursor: pointer;
    }

    .tab.active {
      color: white;
      border-bottom: 2px solid #00ff88;
    }

    /* Bet Input */
    .bet-input-section {
      padding: 16px;
    }

    .bet-input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .bet-input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: #0d1421;
      border-radius: 8px;
      padding: 8px 16px;
      border: 1px solid #1a2533;
    }

    .bet-input-wrapper input {
      background: transparent;
      border: none;
      color: white;
      font-size: 20px;
      font-weight: 700;
      width: 100%;
      outline: none;
    }

    .plus-btn {
      background: #1a2533;
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Quick Chips */
    .chips-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .chip {
      background: #0d1421;
      border: 1px solid #1a2533;
      color: white;
      padding: 12px 0;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      flex: 1;
      text-align: center;
      cursor: pointer;
    }

    .chip.selected {
      background: #1a5c3a;
      border-color: #00ff88;
    }

    /* Bet Button */
    .bet-btn {
      width: 100%;
      padding: 16px;
      border-radius: 8px;
      font-weight: 800;
      font-size: 18px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      background: #00a86b;
      color: white;
      margin-bottom: 8px;
    }

    .bet-btn.hidden {
      display: none;
    }

    .cashout-btn {
      width: 100%;
      padding: 16px;
      border-radius: 8px;
      font-weight: 800;
      font-size: 18px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      background: #e74c3c;
      color: white;
      display: none;
    }

    .cashout-btn.active {
      display: block;
    }

    .bet-amount-display {
      text-align: center;
      color: #6a7a8a;
      font-size: 13px;
      margin-top: 8px;
    }

    /* Auto section */
    .auto-section {
      padding: 16px;
      display: none;
    }

    .auto-section.active {
      display: block;
    }

    .betting-tabs {
      margin-bottom: 0;
    }

    /* Players online */
    .players-online {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 8px;
      color: #6a7a8a;
      font-size: 12px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88; }
      50% { text-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88, 0 0 80px #00ff88; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hidden */
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <!-- Header -->
    <div class="header">
      <h1>Aviator</h1>
    </div>

    <!-- Balance -->
    <div class="balance-row">
      <span class="balance-amount" id="balanceDisplay">0.00</span>
      <span class="balance-currency">KES</span>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Bet Rush -->
    <div class="bet-rush-row">
      <span class="bet-rush">🔥 Bet Rush</span>
      <div class="live-indicator">
        <span class="live-dot"></span>
        <span id="onlineCount">1,247</span>
        <span>online</span>
      </div>
    </div>

    <!-- Rooms Grid -->
    <div class="rooms-grid" id="roomsGrid">
      <!-- Dynamically populated -->
    </div>

    <!-- Canvas -->
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="gameCanvas" width="368" height="240"></canvas>
      <div class="current-multiplier" id="currentMultiplier">1.00x</div>
    </div>

    <!-- Live Bets Feed -->
    <div class="live-bets" id="liveBetsFeed">
      <!-- Dynamic bet feed -->
    </div>

    <!-- Partners -->
    <div class="partners-section">
      <div class="partners-left">
        <span class="ufc-badge">UFC</span>
        <span class="official-text">OFFICIAL<br>PARTNERS</span>
      </div>
      <div class="spribe-right">
        <span class="spribe-badge">SPRIBE</span>
        <span class="since-text">Official Game <span class="verified-check">✓</span><br>Since 2019</span>
      </div>
    </div>

    <!-- Betting Tabs -->
    <div class="betting-tabs">
      <span class="tab active" data-tab="bet">Bet</span>
      <span class="tab" data-tab="auto">Auto</span>
    </div>

    <!-- Bet Section -->
    <div class="bet-input-section" id="betSection">
      <div class="bet-input-row">
        <div class="bet-input-wrapper">
          <input type="number" id="betInput" value="10.00" min="1" step="1">
        </div>
        <button class="plus-btn" id="increaseBet">+</button>
      </div>

      <div class="chips-row">
        <span class="chip" data-amount="100">100</span>
        <span class="chip" data-amount="250">250</span>
        <span class="chip selected" data-amount="1000">1,000</span>
        <span class="chip" data-amount="25000">25,000</span>
      </div>

      <button class="bet-btn" id="placeBetBtn">Bet</button>
      <button class="cashout-btn" id="cashoutBtn">Cash Out</button>
      
      <div class="bet-amount-display">
        <span id="betAmountDisplay">10.00 KES</span>
      </div>
    </div>

    <!-- Auto Section -->
    <div class="auto-section" id="autoSection">
      <div class="bet-input-row">
        <div class="bet-input-wrapper">
          <input type="number" id="autoBetInput" value="10.00" min="1" step="1">
        </div>
        <button class="plus-btn" id="autoIncreaseBet">+</button>
      </div>

      <div class="bet-input-row">
        <div class="bet-input-wrapper">
          <input type="number" id="autoCashoutInput" value="2.00" min="1.01" step="0.1" placeholder="Auto cashout at">
        </div>
      </div>

      <button class="bet-btn" id="startAutoBtn">Start Auto</button>
      <button class="cashout-btn" id="stopAutoBtn">Stop Auto</button>
    </div>

    <!-- Players -->
    <div class="players-online">
      <span>🎮 <span id="playingCount">342</span> playing</span>
      <span>💰 <span id="totalBetAmount">45,280</span> KES</span>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // Canvas
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const wrapper = document.getElementById('canvasWrapper');
      
      // UI
      const balanceDisplay = document.getElementById('balanceDisplay');
      const currentMultiplier = document.getElementById('currentMultiplier');
      const roomsGrid = document.getElementById('roomsGrid');
      const liveBetsFeed = document.getElementById('liveBetsFeed');
      const onlineCount = document.getElementById('onlineCount');
      const playingCount = document.getElementById('playingCount');
      const totalBetAmount = document.getElementById('totalBetAmount');
      const betInput = document.getElementById('betInput');
      const betAmountDisplay = document.getElementById('betAmountDisplay');
      const placeBetBtn = document.getElementById('placeBetBtn');
      const cashoutBtn = document.getElementById('cashoutBtn');
      
      // Game state
      let balance = 10000.00;
      let currentBet = 10.00;
      let multiplier = 1.00;
      let isFlying = false;
      let hasCrashed = false;
      let hasCashedOut = false;
      let crashPoint = 1.00;
      let flightProgress = 0;
      let animationFrame = null;
      let gameLoopInterval = null;
      
      // Simulated players
      let simulatedPlayers = [];
      let onlinePlayers = 1247;
      let activePlayers = 342;
      let poolAmount = 45280;
      
      // Rooms history
      let roomsHistory = [5.36, 1.21, 4.55, 9.34, 7.58, 1.47, 10.03];
      
      // Canvas dimensions
      const W = 368;
      const H = 240;
      const GROUND_Y = H - 30;
      
      // Continuous game settings
      const ROUND_DURATION = 8000; // 8 seconds average
      const COUNTDOWN_BETWEEN = 3000; // 3 seconds between rounds
      
      // Format currency
      function formatNumber(num) {
        return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      
      function updateBalance() {
        balanceDisplay.textContent = formatNumber(balance);
      }
      
      // Update rooms grid
      function updateRoomsGrid() {
        let html = '';
        roomsHistory.slice(0, 7).forEach((val, i) => {
          const isGreen = val >= 2.0;
          html += `
            <div class="room-card">
              <div class="room-name">Room #${i + 1}</div>
              <div class="room-multiplier ${isGreen ? 'multiplier-green' : 'multiplier-red'}">${val.toFixed(2)}x</div>
            </div>
          `;
        });
        roomsGrid.innerHTML = html;
      }
      
      // Add to history
      function addToHistory(value) {
        roomsHistory.unshift(value);
        if (roomsHistory.length > 7) roomsHistory.pop();
        updateRoomsGrid();
      }
      
      // Generate crash point
      function getCrashPoint() {
        const r = Math.random();
        if (r < 0.35) return 1.0 + Math.random() * 1.0;
        if (r < 0.65) return 2.0 + Math.random() * 2.5;
        if (r < 0.85) return 4.5 + Math.random() * 5.0;
        if (r < 0.96) return 9.5 + Math.random() * 15.0;
        return 24.5 + Math.random() * 50.0;
      }
      
      // Simulate other players betting
      function simulatePlayerBets() {
        const playerCount = Math.floor(Math.random() * 5) + 3;
        for (let i = 0; i < playerCount; i++) {
          const betAmount = Math.floor(Math.random() * 900) + 100;
          const autoCashout = Math.random() > 0.5 ? (Math.random() * 5 + 1.5).toFixed(2) : null;
          
          simulatedPlayers.push({
            id: Math.random().toString(36),
            bet: betAmount,
            autoCashout: autoCashout ? parseFloat(autoCashout) : null,
            cashedOut: false,
            cashoutMultiplier: null
          });
          
          poolAmount += betAmount;
          addBetToFeed(`User${Math.floor(Math.random() * 10000)}`, betAmount);
        }
        updateStats();
      }
      
      // Add bet to live feed
      function addBetToFeed(username, amount) {
        const feedItem = document.createElement('div');
        feedItem.className = 'bet-feed-item';
        feedItem.innerHTML = `<span>${username}</span> <span class="bet-amount">${amount} KES</span> <span>placed bet</span>`;
        liveBetsFeed.insertBefore(feedItem, liveBetsFeed.firstChild);
        
        // Keep only last 3 items
        while (liveBetsFeed.children.length > 3) {
          liveBetsFeed.removeChild(liveBetsFeed.lastChild);
        }
      }
      
      // Add cashout to feed
      function addCashoutToFeed(username, amount, mult) {
        const feedItem = document.createElement('div');
        feedItem.className = 'bet-feed-item';
        feedItem.innerHTML = `<span>${username}</span> <span class="bet-cashout">${amount} KES</span> <span>at ${mult}x</span>`;
        liveBetsFeed.insertBefore(feedItem, liveBetsFeed.firstChild);
        
        while (liveBetsFeed.children.length > 3) {
          liveBetsFeed.removeChild(liveBetsFeed.lastChild);
        }
      }
      
      // Update stats
      function updateStats() {
        onlinePlayers = Math.floor(onlinePlayers + (Math.random() * 40 - 20));
        onlinePlayers = Math.max(1000, Math.min(2000, onlinePlayers));
        activePlayers = simulatedPlayers.filter(p => !p.cashedOut).length + (isFlying ? 1 : 0);
        
        onlineCount.textContent = onlinePlayers.toLocaleString();
        playingCount.textContent = activePlayers;
        totalBetAmount.textContent = poolAmount.toLocaleString();
      }
      
      // Simulate player cashouts during flight
      function simulatePlayerActions() {
        simulatedPlayers.forEach(player => {
          if (!player.cashedOut && multiplier > 1.1) {
            // Auto cashout
            if (player.autoCashout && multiplier >= player.autoCashout) {
              player.cashedOut = true;
              player.cashoutMultiplier = multiplier;
              const winAmount = Math.floor(player.bet * multiplier);
              poolAmount -= winAmount;
              addCashoutToFeed(`User${Math.floor(Math.random() * 10000)}`, winAmount, multiplier.toFixed(2));
            }
            // Random manual cashout
            else if (Math.random() < 0.02 && multiplier < crashPoint) {
              player.cashedOut = true;
              player.cashoutMultiplier = multiplier;
              const winAmount = Math.floor(player.bet * multiplier);
              poolAmount -= winAmount;
              addCashoutToFeed(`User${Math.floor(Math.random() * 10000)}`, winAmount, multiplier.toFixed(2));
            }
          }
        });
        
        // Remove cashed out players after a delay
        simulatedPlayers = simulatedPlayers.filter(p => !p.cashedOut || p.cashoutMultiplier === null);
      }
      
      // Draw game
      function drawGame() {
        ctx.clearRect(0, 0, W, H);
        
        // Grid
        ctx.strokeStyle = '#1a2a4a';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= 5; i++) {
          const y = GROUND_Y - (i * 38);
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
        }
        
        for (let i = 0; i <= 4; i++) {
          const x = i * (W / 4);
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, H);
          ctx.stroke();
        }
        
        // Curve
        if (flightProgress > 0.01) {
          ctx.beginPath();
          ctx.moveTo(0, GROUND_Y);
          
          for (let i = 0; i <= 100; i++) {
            const t = (i / 100) * flightProgress;
            const expY = Math.pow(Math.E, 3.5 * t) - 1;
            const y = GROUND_Y - (expY * 0.6);
            const x = t * W;
            
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          
          ctx.shadowColor = '#00ff88';
          ctx.shadowBlur = 20;
          ctx.strokeStyle = '#00e676';
          ctx.lineWidth = 3.5;
          ctx.stroke();
          ctx.shadowBlur = 0;
        }
        
        // Rocket
        const rocketX = flightProgress * W;
        const expY = Math.pow(Math.E, 3.5 * flightProgress) - 1;
        const rocketY = GROUND_Y - (expY * 0.6);
        
        if (isFlying && !hasCrashed) {
          ctx.shadowColor = '#ff6600';
          ctx.shadowBlur = 18;
          ctx.fillStyle = '#ff9800';
          ctx.beginPath();
          ctx.moveTo(rocketX - 16, rocketY - 2);
          ctx.lineTo(rocketX - 28, rocketY);
          ctx.lineTo(rocketX - 16, rocketY + 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
        
        // Rocket body
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.ellipse(rocketX, rocketY, 11, 6.5, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Red nose
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.ellipse(rocketX + 5, rocketY - 1, 4.5, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Window
        ctx.fillStyle = '#3498db';
        ctx.beginPath();
        ctx.ellipse(rocketX + 1, rocketY - 2, 2.5, 2, 0, 0, Math.PI * 2);
        ctx.fill();
        
        if (hasCrashed) {
          ctx.fillStyle = '#ff000040';
          ctx.fillRect(0, 0, W, H);
          ctx.font = 'bold 22px -apple-system, sans-serif';
          ctx.fillStyle = 'white';
          ctx.shadowColor = '#ff0000';
          ctx.shadowBlur = 25;
          ctx.textAlign = 'center';
          ctx.fillText('💥 CRASHED', W/2, H/2);
          ctx.shadowBlur = 0;
          ctx.textAlign = 'left';
        }
      }
      
      // Animation
      function animate() {
        if (!isFlying) {
          drawGame();
          return;
        }
        
        multiplier += 0.01 * multiplier;
        flightProgress = Math.min(1.0, flightProgress + 0.005);
        
        currentMultiplier.textContent = multiplier.toFixed(2) + 'x';
        
        // Simulate other players
        simulatePlayerActions();
        updateStats();
        
        drawGame();
        
        if (multiplier >= crashPoint && !hasCrashed) {
          crash();
          return;
        }
        
        // Auto cashout for player
        if (autoMode && !hasCashedOut && multiplier >= autoCashoutAt) {
          cashOut();
        }
        
        animationFrame = requestAnimationFrame(animate);
      }
      
      // Crash
      function crash() {
        hasCrashed = true;
        isFlying = false;
        
        wrapper.classList.remove('flying');
        currentMultiplier.classList.remove('flying');
        currentMultiplier.style.color = '#e74c3c';
        
        addToHistory(multiplier);
        
        if (!hasCashedOut && currentBet > 0) {
          balance -= currentBet;
          updateBalance();
        }
        
        // Simulate other players losing
        simulatedPlayers = [];
        poolAmount = Math.floor(poolAmount * 0.3);
        
        drawGame();
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
        
        placeBetBtn.classList.remove('hidden');
        cashoutBtn.classList.remove('active');
        
        // Start next round automatically
        setTimeout(() => {
          startNewRound();
        }, COUNTDOWN_BETWEEN);
      }
      
      // Cash out
      function cashOut() {
        if (!isFlying || hasCrashed || hasCashedOut) return;
        
        hasCashedOut = true;
        isFlying = false;
        
        const winAmount = currentBet * multiplier;
        balance += winAmount;
        updateBalance();
        
        addCashoutToFeed('You', Math.floor(winAmount), multiplier.toFixed(2));
        
        wrapper.classList.remove('flying');
        currentMultiplier.classList.remove('flying');
        currentMultiplier.style.color = '#00ff88';
        
        addToHistory(multiplier);
        
        placeBetBtn.classList.remove('hidden');
        cashoutBtn.classList.remove('active');
        
        drawGame();
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
        
        setTimeout(() => {
          startNewRound();
        }, COUNTDOWN_BETWEEN);
      }
      
      // Auto mode
      let autoMode = false;
      let autoCashoutAt = 2.0;
      
      // Start new round (continuous)
      function startNewRound() {
        multiplier = 1.00;
        flightProgress = 0;
        hasCrashed = false;
        hasCashedOut = false;
        crashPoint = getCrashPoint();
        
        currentMultiplier.textContent = '1.00x';
        currentMultiplier.style.color = 'white';
        wrapper.classList.remove('flying');
        currentMultiplier.classList.remove('flying');
        
        // Simulate new bets
        simulatePlayerBets();
        
        drawGame();
        
        // Auto start flight after countdown
        setTimeout(() => {
          isFlying = true;
          wrapper.classList.add('flying');
          currentMultiplier.classList.add('flying');
          currentMultiplier.style.color = '#00ff88';
          
          if (autoMode) {
            placeBetBtn.classList.add('hidden');
            cashoutBtn.classList.add('active');
          }
          
          animationFrame = requestAnimationFrame(animate);
        }, 1500);
      }
      
      // Manual bet
      function placeBet() {
        if (isFlying) return;
        
        const bet = parseFloat(betInput.value);
        if (isNaN(bet) || bet < 1) return;
        if (bet > balance) return;
        
        currentBet = bet;
        balance -= bet;
        updateBalance();
        
        addBetToFeed('You', bet);
        
        placeBetBtn.classList.add('hidden');
        cashoutBtn.classList.add('active');
      }
      
      // Initialize continuous game
      function initGame() {
        updateBalance();
        updateRoomsGrid();
        drawGame();
        
        // Start first round
        startNewRound();
        
        // Update stats periodically
        setInterval(() => {
          if (!isFlying) {
            onlinePlayers = Math.floor(onlinePlayers + (Math.random() * 30 - 15));
            onlinePlayers = Math.max(1000, Math.min(2000, onlinePlayers));
            onlineCount.textContent = onlinePlayers.toLocaleString();
          }
        }, 2000);
      }
      
      // Event listeners
      placeBetBtn.addEventListener('click', placeBet);
      cashoutBtn.addEventListener('click', cashOut);
      
      document.getElementById('increaseBet').addEventListener('click', () => {
        let val = parseFloat(betInput.value) || 10;
        betInput.value = (val + 10).toFixed(2);
        betAmountDisplay.textContent = betInput.value + ' KES';
      });
      
      betInput.addEventListener('input', () => {
        betAmountDisplay.textContent = betInput.value + ' KES';
      });
      
      document.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const amount = parseFloat(chip.dataset.amount);
          betInput.value = amount.toFixed(2);
          betAmountDisplay.textContent = amount.toFixed(2) + ' KES';
          
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
        });
      });
      
      // Tab switching
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const tabName = tab.dataset.tab;
          
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          if (tabName === 'bet') {
            document.getElementById('betSection').style.display = 'block';
            document.getElementById('autoSection').classList.remove('active');
          } else {
            document.getElementById('betSection').style.display = 'none';
            document.getElementById('autoSection').classList.add('active');
          }
        });
      });
      
      // Auto bet
      document.getElementById('startAutoBtn').addEventListener('click', () => {
        const bet = parseFloat(document.getElementById('autoBetInput').value);
        const cashoutAt = parseFloat(document.getElementById('autoCashoutInput').value);
        
        if (isNaN(bet) || bet < 1) return;
        if (bet > balance) return;
        
        autoMode = true;
        autoCashoutAt = cashoutAt;
        currentBet = bet;
        
        document.getElementById('startAutoBtn').classList.add('hidden');
        document.getElementById('stopAutoBtn').classList.add('active');
      });
      
      document.getElementById('stopAutoBtn').addEventListener('click', () => {
        autoMode = false;
        document.getElementById('startAutoBtn').classList.remove('hidden');
        document.getElementById('stopAutoBtn').classList.remove('active');
      });
      
      // Start
      initGame();
      
    })();
  </script>
</body>
  </html>
